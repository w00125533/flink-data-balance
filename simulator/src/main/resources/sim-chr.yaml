kafka:
  bootstrap: localhost:9092
  topic: chr-events
  topologyTopic: topology

rate:
  eps: 5000
  maxOutOfOrderLagMs: 5000
  outOfOrderProb: 0.05

userPool:
  size: 100000

skewProfile:
  static:
    enabled: true
  diurnal:
    enabled: true
    rushHourMultipliers:
      "07:00-09:30": 2.5
      "17:00-20:00": 3.0
      "00:00-05:00": 0.3
  noise:
    enabled: true
    stdRatio: 0.15
